<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2196F3">
    <meta name="description" content="Sistem Absensi Karyawan">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">

    <title>Absensi Karyawan</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Cache Buster Script -->
    <script>
        // Force refresh and clear service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for(let registration of registrations) {
                    registration.unregister();
                }
            });
        }
        // Clear all caches
        if ('caches' in window) {
            caches.keys().then(function(names) {
                for (let name of names) caches.delete(name);
            });
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css?v=2.3.0">
</head>
<body>
    <!-- App Container -->
    <div id="app">
        <!-- Header -->
        <header class="app-header">
            <h1>Absensi Karyawan</h1>
        </header>

        <!-- Main Content -->
        <main class="app-content">
            <!-- Employee Info Card -->
            <section class="card employee-card">
                <h2>Informasi Karyawan</h2>

                <div class="form-group">
                    <label for="employeeSearch">Cari Nama / ID Karyawan</label>
                    <input 
                        type="text" 
                        id="employeeSearch" 
                        class="form-input" 
                        list="employeeDatalist" 
                        placeholder="Ketik nama atau ID..."
                        autocomplete="off"
                    >
                    <datalist id="employeeDatalist"></datalist>
                </div>

                <div class="form-group">
                    <label for="employeeId">ID Karyawan</label>
                    <input
                        type="text"
                        id="employeeId"
                        class="form-input"
                        placeholder="Contoh: EMP001"
                        readonly
                    >
                </div>

                <div class="form-group">
                    <label for="employeeName">Nama Karyawan</label>
                    <input
                        type="text"
                        id="employeeName"
                        class="form-input"
                        placeholder="Nama karyawan"
                        readonly
                    >
                </div>

                <button id="saveInfoBtn" class="btn btn-secondary" style="display: none;">
                    💾 Simpan Info
                </button>
            </section>


            <!-- Attendance Buttons -->
            <section class="card attendance-card">
                <h2>📝 Absensi</h2>

                <!-- Manual Time Toggle -->
                <div class="manual-time-toggle">
                    <label class="toggle-switch">
                        <input type="checkbox" id="manualTimeToggle">
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Atur Waktu Manual</span>
                </div>

                <!-- Manual Time Input -->
                <div id="manualTimeContainer" class="form-group" style="display: none; margin-top: 15px;">
                    <label for="manualTimeInput">Pilih Waktu</label>
                    <input 
                        type="datetime-local" 
                        id="manualTimeInput" 
                        class="form-input"
                    >
                </div>

                <div class="attendance-buttons">
                    <button id="checkInBtn" class="btn btn-checkin">
                        <span class="btn-icon">☀️</span>
                        <span class="btn-text">Check In</span>
                    </button>

                    <button id="checkOutBtn" class="btn btn-checkout">
                        <span class="btn-icon">🌙</span>
                        <span class="btn-text">Check Out</span>
                    </button>
                </div>
            </section>

            <!-- Status Messages -->
            <section id="statusSection" class="card status-card" style="display: none;">
                <div id="statusMessage" class="status-message"></div>
            </section>


            <!-- History Card -->
            <section class="card history-card">
                <h2>📝 Riwayat Hari Ini</h2>
                <div id="todayHistory" class="history-list">
                    <p class="empty-state">Belum ada absensi hari ini</p>
                </div>
            </section>

        </main>

        <!-- Loading Overlay -->
        <div id="loadingOverlay" class="loading-overlay" style="display: none;">
            <div class="loading-spinner"></div>
            <p id="loadingText">Memproses...</p>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="toast" style="display: none;">
            <span id="toastMessage"></span>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/config.js?v=2.3.0"></script>
    <script src="js/storage.js?v=2.3.0"></script>
    <script src="js/location.js?v=2.3.0"></script>
    <script src="js/api.js?v=2.3.0"></script>
    <script src="js/employees.js?v=2.3.0"></script>
    <script src="js/app.js?v=2.3.0"></script>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered:', registration);
                        
                        // Check for updates
                        registration.onupdatefound = () => {
                            const installingWorker = registration.installing;
                            if (installingWorker) {
                                installingWorker.onstatechange = () => {
                                    if (installingWorker.state === 'installed') {
                                        if (navigator.serviceWorker.controller) {
                                            console.log('New version available! Refreshing...');
                                            window.location.reload();
                                        }
                                    }
                                };
                            }
                        };
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }

    </script>
</body>
</html>
